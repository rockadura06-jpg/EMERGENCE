<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EMERGENCE</title>
        <link rel="manifest" href="/manifest.json">
        <link rel="stylesheet" href="/css/style.css">
        <link rel="stylesheet" href="/libs/leaflet.css">
        <script src="/libs/leaflet.js"></script>
        <script type="module" src="js/firebase-init.js"></script>
    </head>
    <body>
        <header>
            <div id="logo">
                <h1>EMERGENCE</h1>
                <p>Área Metropolitana de Guadalajara</p>
            </div>
            <div id="estado-live">
                <span id="indicador">● online</span>
            </div>
        </header>

        <main>
            <div id="mapa">
            </div>

            <aside id="panel-datos">
                <section id="seccion-precipitacion">
                    <h3>PRECIPITACION ACTUAL</h3>
                    <h2 id="nivel-riesgo">Cargando...</h2>
                    <p id="precipitacion">Obteniendo datos...</p>
                </section>

                <section id="seccion-riesgo">
                    <h3 id="toggle-zonas" style="cursor:pointer;">ZONAS DE RIESGO ▲</h3>
                    <div id="lista-zonas"></div>
                </section>

                <section id="seccion-reporte">
                    <h3>REPORTE CIUDADANO</h3>
                    <button id="btn-reportar">reportar inundacion</button>
                </section>
            </aside>
        </main>

        <div id="modal-reporte" style="display:none;">
            <div id="contenido-modal">
                <p id="coordenadas-modal">Coordenadas: --</p>

                <label>Nombre o Alias</label>
                <imput type="text" id="input-nombre" placeholder="Tu nombre o alias">

                <label>Nivel de Agua</label>
                <select id="input-nivel">
                    <option value="">--Selecionar--</option>
                    <option value="bajo">Bajo (tobillo)</option>
                    <option value="medio">Medio (rodilla)</option>
                    <option value="alto">Alto (cintura)</option>
                    <option value="critico">Critico (pecho)</option>
                </select>

                <label>Descripción</label>
                <textarea id="imput-description" placeholder="Describe la situación..."></textarea>

                <label>Fotografía (opcional)</label>
                <imput type="file" id="input-foto" accept="image/*">

                <button id="btn-enviar">Enviar</button>
                <button id="btn-cancelar-modal">Cancelar</button>
            </div>
        </div>

        <script type="module" src="js/app.js"></script>
        </body>
</html>
